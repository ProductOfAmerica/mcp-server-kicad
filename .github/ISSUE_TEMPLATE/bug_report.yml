name: Bug Report
description: Report a bug in mcp-server-kicad
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Configure server with ...
        2. Call tool ...
        3. See error ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package Version
      description: "Output of: pip show mcp-server-kicad"
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: kicad_version
    attributes:
      label: KiCad Version
      description: "Output of: kicad-cli version (only needed for export server issues)"
      placeholder: "9.0.0"
    validations:
      required: false
