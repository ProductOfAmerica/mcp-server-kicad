name: Release
on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
permissions:
  contents: write
  id-token: write
jobs:
  release:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@v3
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - run: uv sync --frozen --all-extras --dev

      # Lint
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pyright

      # Test
      - run: uv run pytest -v

      # Bump version
      - name: Bump version
        id: bump
        run: |
          python - "${{ inputs.bump }}" <<'PYEOF'
          import re, sys

          bump_type = sys.argv[1]
          path = "pyproject.toml"
          text = open(path).read()

          match = re.search(r'^version = "(\d+)\.(\d+)\.(\d+)"', text, re.MULTILINE)
          major, minor, patch = int(match.group(1)), int(match.group(2)), int(match.group(3))

          if bump_type == "major":
              major, minor, patch = major + 1, 0, 0
          elif bump_type == "minor":
              major, minor, patch = major, minor + 1, 0
          else:
              major, minor, patch = major, minor, patch + 1

          new_version = f"{major}.{minor}.{patch}"
          text = re.sub(r'^version = ".*"', f'version = "{new_version}"', text, count=1, flags=re.MULTILINE)
          open(path, "w").write(text)

          # Also bump plugin.json
          import json
          plugin_path = ".claude-plugin/plugin.json"
          plugin = json.loads(open(plugin_path).read())
          plugin["version"] = new_version
          open(plugin_path, "w").write(json.dumps(plugin, indent=2) + "\n")

          print(f"new_version={new_version}")
          PYEOF

          NEW_VERSION=$(python -c "
          import re
          text = open('pyproject.toml').read()
          m = re.search(r'^version = \"(.+?)\"', text, re.MULTILINE)
          print(m.group(1))
          ")
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      # Update lock file
      - run: uv lock

      # Commit and push
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml uv.lock .claude-plugin/plugin.json
          git commit -m "chore: bump version to v${{ steps.bump.outputs.version }}"
          git push

      # Build
      - run: uv build

      # Create GitHub release
      - name: Create release
        run: |
          gh release create "v${{ steps.bump.outputs.version }}" \
            --title "v${{ steps.bump.outputs.version }}" \
            --generate-notes \
            dist/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Publish to PyPI
      - uses: pypa/gh-action-pypi-publish@release/v1
